version: 1.0
runtime: python311

build:
  commands:
    build:
      - echo "Building Docker image from Dockerfile..."
      - docker build -t telecom-assistant .

run:
  command: "./startup.sh"
  network:
    port: 8501
  env:
    - name: LLM_PROVIDER
      value: "openrouter"
    - name: OPENROUTER_API_KEY
      value: "YOUR_OPENROUTER_API_KEY"
    - name: OPENROUTER_MODEL
      value: "your-model-here"
    - name: LLM_TEMPERATURE
      value: "0.1"
    - name: LLM_MAX_TOKENS
      value: "1024"
    - name: EMBEDDING_BACKEND
      value: "local"
    - name: CONFIDENCE_THRESHOLD
      value: "0.6"
    - name: API_HOST
      value: "0.0.0.0"
    - name: API_PORT
      value: "8000"
